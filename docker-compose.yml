# Geliştirme + manuel smoke için PostgreSQL.
# POSTGRES_USER = racar_owner -> migration/DDL sahibi (Migrator connection string).
# Init script (scripts/db-init-roles.sql) racar_app (kısıtlı runtime rolü) oluşturur.
# NOT: Entegrasyon testleri bu instance'ı KULLANMAZ; Testcontainers kendi postgres'ini açar.
services:
  db:
    image: postgres:16
    container_name: racar-db
    environment:
      POSTGRES_USER: racar_owner
      POSTGRES_PASSWORD: racar_owner_pw
      POSTGRES_DB: racar
    ports:
      - "5432:5432"
    volumes:
      - racar-pgdata:/var/lib/postgresql/data
      - ./scripts/db-init-roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racar_owner -d racar"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  racar-pgdata:
